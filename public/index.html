<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>content — Content Units</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Content Units</h1>
    <div class="filters">
      <label>Produkt
        <select id="filter-product"><option value="">— wszystkie —</option></select>
      </label>
      <label>Status
        <select id="filter-status">
          <option value="">— wszystkie —</option>
          <option value="backlog">backlog</option>
          <option value="ready">ready</option>
          <option value="published">published</option>
          <option value="archived">archived</option>
        </select>
      </label>
      <label>Typ
        <select id="filter-type">
          <option value="">— wszystkie —</option>
          <option value="feature">feature</option>
          <option value="pain">pain</option>
          <option value="story">story</option>
          <option value="edu">edu</option>
          <option value="social-proof">social-proof</option>
        </select>
      </label>
      <button id="refresh-btn" type="button">Odśwież</button>
      <button id="sync-btn" type="button" class="sync-btn">Sync</button>
    </div>
  </header>

  <div id="sync-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-body">
      <button id="sync-close" type="button" class="close-btn">×</button>
      <h2>Sync</h2>
      <div id="sync-content"></div>
    </div>
  </div>

  <main>
    <section id="view-product" class="view hidden">
      <button id="back-to-list" type="button" class="back-btn">← Wróć do listy CU</button>
      <h2 id="product-name"></h2>
      <div id="product-stats" class="stats"></div>
      <section class="product-doc">
        <h3>Foundation</h3>
        <div id="product-foundation" class="markdown"></div>
      </section>
      <section class="product-doc">
        <h3>Gaps</h3>
        <div id="product-gaps" class="markdown"></div>
      </section>
    </section>

    <section id="view-list" class="view table-wrap">
      <table id="units-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Tytuł</th>
            <th>Produkt</th>
            <th>Moduł</th>
            <th>Typ</th>
            <th>Rola</th>
            <th>Status</th>
            <th>Walid.</th>
            <th>Akcje</th>
          </tr>
        </thead>
        <tbody id="units-tbody">
          <tr><td colspan="9" class="empty">Ładowanie…</td></tr>
        </tbody>
      </table>
    </section>

    <aside id="detail-panel" class="detail-panel hidden">
      <button id="detail-close" type="button" class="close-btn">×</button>
      <div id="detail-content"></div>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
